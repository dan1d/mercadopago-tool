[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "langchain-mercadopago"
version = "0.1.0"
description = "LangChain tools for Mercado Pago payments (CobroYa)"
readme = "README.md"
requires-python = ">=3.9"
license = "MIT"
keywords = ["langchain", "mercadopago", "payments", "ai", "agent"]

dependencies = [
    "langchain-core>=0.2.0",
    "httpx",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-asyncio",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
